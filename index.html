
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <header>
    <h1>Algorithm Visualizer</h1>
    <p>Sorting & Pathfinding Algorithms in Real Time</p>
  </header>

  <section class="controls glass">
    <div class="control-group">
      <label>Visualizer</label>
      <select id="modeSelect">
        <option value="sorting">Sorting</option>
        <option value="pathfinding">Pathfinding</option>
      </select>
    </div>

    <div class="control-group">
      <label>Algorithm</label>
      <select id="algorithmSelect"></select>
    </div>

    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="100" value="50" />
    </div>

    <div class="control-group">
      <label>Size</label>
      <input type="range" id="size" min="10" max="80" value="30" />
    </div>

    <div class="buttons">
      <button id="generateBtn">Generate</button>
      <button id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
      <button id="stopBtn">Stop</button>
    </div>
  </section>

  <section class="stats glass">
    <div>
      <h3>Comparisons</h3>
      <p id="comparisons">0</p>
    </div>

    <div>
      <h3>Swaps</h3>
      <p id="swaps">0</p>
    </div>

    <div>
      <h3>Execution Time</h3>
      <p id="time">0 ms</p>
    </div>
  </section>

  <section class="info-panel glass">
    <h2>Algorithm Info</h2>
    <p id="description">Choose an algorithm to begin.</p>

    <div class="complexity">
      <div>
        <strong>Time Complexity:</strong>
        <span id="timeComplexity">-</span>
      </div>

      <div>
        <strong>Space Complexity:</strong>
        <span id="spaceComplexity">-</span>
      </div>
    </div>

    <h3>Current Step</h3>
    <p id="stepInfo">Waiting...</p>
  </section>

  <main>
    <div id="sortingContainer" class="sorting-container glass"></div>
    <div id="grid" class="grid glass hidden"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
